<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <title>脑洞集 - MindVault</title>
    <style>
      /* 初始加载样式，防止白屏闪烁 */
      body {
        margin: 0;
        padding: 0;
        background-color: var(--bg-primary, #f8f9fa);
        font-family: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', -apple-system, BlinkMacSystemFont, sans-serif;
      }
      #root-loading {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
        gap: 16px;
      }
      #root-loading .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid var(--border-color, #e0e0e0);
        border-top-color: var(--primary-color, #6C63FF);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      #root-loading .text {
        color: var(--text-secondary, #888);
        font-size: 14px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="root-loading">
        <div class="spinner"></div>
        <div class="text">脑洞集加载中...</div>
      </div>
    </div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
